<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <!-- Sign-up form start -->
  <img src="assets/images/illustration-sign-up-mobile.svg"></img>
  <h1 class="title">Stay updated!</h1>
  <p class="body-text">Join 60,000+ product managers receiving monthly updates on:
    <ul>
      <li>Product discovery and building what matters</li>
      <li>Measuring to ensure updates are a success</li>
      <li>And much more!</li>
    </ul>
  </p>
  
  <form action="">
    <label for="email" class="email-label">Email address</label>
    <input type="email" id="email" name="email" placeholder="email@company.com">
  </form>
  

  <button class="subscribe-button">Subscribe to monthly newsletter</button>

  <!-- Sign-up form end -->

  <!-- Success message start -->

  <!-- <h1 class="title">Thanks for subscribing!</h1>

  <p class="body-text">A confirmation email has been sent to ash@loremcompany.com. Please open it and click the button inside to confirm your subscription.</p>

  <button class="subscribe-button">Dismiss message</button> -->

  <!-- Success message end -->
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
